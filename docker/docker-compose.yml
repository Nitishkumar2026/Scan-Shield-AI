version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ai-scam-shield-db
    environment:
      POSTGRES_USER: ${DB_USER:-aiscamshield}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword123}
      POSTGRES_DB: ${DB_NAME:-aiscamshield}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    networks:
      - ai-scam-shield-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aiscamshield} -d ${DB_NAME:-aiscamshield}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ai-scam-shield-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - ai-scam-shield-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5-community
    container_name: ai-scam-shield-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4jpassword}
      NEO4J_PLUGINS: '["apoc", "gds"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - ai-scam-shield-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-neo4jpassword}", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # AI Service (FastAPI)
  ai-service:
    build:
      context: ../backend/ai-service
      dockerfile: Dockerfile
    container_name: ai-scam-shield-ai
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      - MODEL_PATH=/app/models
      - LOG_LEVEL=INFO
    volumes:
      - ai_models:/app/models
    ports:
      - "8000:8000"
    networks:
      - ai-scam-shield-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # API Gateway (Node.js)
  api-gateway:
    build:
      context: ../backend/api-gateway
      dockerfile: Dockerfile
    container_name: ai-scam-shield-gateway
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-aiscamshield}
      - DB_PASSWORD=${DB_PASSWORD:-securepassword123}
      - DB_NAME=${DB_NAME:-aiscamshield}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      - AI_SERVICE_URL=http://ai-service:8000
      - GRAPH_SERVICE_URL=http://neo4j:7474
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
    ports:
      - "3000:3000"
    networks:
      - ai-scam-shield-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (Nginx)
  frontend:
    build:
      context: ../app
      dockerfile: Dockerfile
    container_name: ai-scam-shield-frontend
    ports:
      - "80:80"
      - "443:443"
    networks:
      - ai-scam-shield-network
    depends_on:
      - api-gateway
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro

  # Kafka (for event streaming)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ai-scam-shield-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ai-scam-shield-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ai-scam-shield-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ai-scam-shield-network

  # Prometheus (monitoring)
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: ai-scam-shield-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - ai-scam-shield-network

  # Grafana (visualization)
  grafana:
    image: grafana/grafana:10.2.3
    container_name: ai-scam-shield-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    networks:
      - ai-scam-shield-network
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  ai_models:
  prometheus_data:
  grafana_data:

networks:
  ai-scam-shield-network:
    driver: bridge
